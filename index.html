<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Soạn Báo Cáo Sự Cố Tự Động_Update June11</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --primary-color: #2c3e50;
            --accent-color: #34495e;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            padding: 20px 10px;
        }
        .wrapper {
            max-width: 850px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }
        header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }
        header h1 {
            font-size: 22px;
            color: var(--primary-color);
            font-weight: 700;
        }
        header p {
            font-size: 13px;
            color: #64748b;
            margin-top: 5px;
        }
        .form-row {
            display: block;
            margin-bottom: 15px;
        }
        @media (min-width: 600px) {
            .grid-2 {
                display: flex;
                gap: 20px;
                margin-bottom: 10px;
            }
            .grid-col {
                flex: 1;
                margin-bottom: 0;
            }
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 13.5px;
            color: var(--accent-color);
            margin-bottom: 6px;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            color: #334155;
            background-color: #fff;
            font-family: inherit;
        }
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        textarea {
            resize: vertical;
        }
        .time-box {
            display: block;
            position: relative;
        }
        .time-box input {
            padding-right: 100px;
        }
        .btn-time {
            position: absolute;
            right: 5px;
            top: 5px;
            bottom: 5px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1d4ed8;
            padding: 0 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-time:hover {
            background: #dbeafe;
        }
        .actions-bar {
            margin: 30px 0 20px 0;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 8px;
            text-align: center;
        }
        .actions-title {
            font-size: 13px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        .btn-zone {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s, opacity 0.2s;
        }
        @media (min-width: 600px) {
            .btn-zone {
                display: flex;
                flex-direction: row;
                justify-content: center;
                gap: 15px;
            }
            .btn {
                width: 220px;
            }
        }
        .btn:active { transform: scale(0.98); }
        .btn-danger { background-color: #ef4444; }
        .btn-warning { background-color: #f59e0b; }
        .btn-success { background-color: #10b981; }
        
        .output-zone {
            margin-top: 25px;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            padding: 15px;
            background: #fafafa;
        }
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .output-title {
            font-weight: 700;
            color: var(--primary-color);
            font-size: 14px;
        }
        .btn-copy {
            background: #0f172a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-copy:hover { background: #1e293b; }
        #finalResult {
            width: 100%;
            height: 320px;
            font-family: "Courier New", Courier, monospace;
            font-size: 13px;
            line-height: 1.6;
            background: #ffffff;
            color: #0f172a;
            border: 1px solid #e2e8f0;
            padding: 12px;
        }
        .sp-status {
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
            color: #475569;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>🚨 CÔNG CỤ TẠO BÁO CÁO SỰ CỐ & ĐỒNG BỘ SHAREPOINT_13h50</h1>
        <p>Hệ thống tự động chuẩn hóa định dạng văn bản quy trình vận hành</p>
    </header>

    <div class="form-row">
        <label for="incidentName">1. Tên sự cố:</label>
        <textarea id="incidentName" rows="2">Mô tả tên sự cố</textarea>
    </div>

    <div class="grid-2">
        <div class="grid-col form-row">
            <label for="startTime">2. Thời gian bắt đầu:</label>
            <div class="time-box">
                <input type="text" id="startTime" placeholder="Để trống tự lấy giờ hiện tại">
                <button class="btn-time" onclick="setNow('startTime')">Giờ hiện tại</button>
            </div>
        </div>
        <div class="grid-col form-row">
            <label for="endTime">3. Thời gian kết thúc:</label>
            <div class="time-box">
                <input type="text" id="endTime" placeholder="Điền khi kết thúc sự cố">
                <button class="btn-time" onclick="setNow('endTime')">Giờ hiện tại</button>
            </div>
        </div>
    </div>

    <div class="grid-2">
        <div class="grid-col form-row">
            <label for="impact">4. Mức độ ảnh hưởng / Phân vùng lỗi:</label>
            <input type="text" id="impact" value="Mô tả phân vùng ảnh hưởng">
        </div>
        <div class="grid-col form-row">
            <label for="reason">5. Nguyên nhân:</label>
            <input type="text" id="reason" value="Đang kiểm tra...">
        </div>
    </div>

    <div class="form-row">
        <label for="steps">6. Các bước đã xử lý (Mỗi hành động một dòng):</label>
        <textarea id="steps" rows="3">- &#10;- &#10;- </textarea>
    </div>

    <div class="form-row">
        <label for="nextSteps">7. Bước xử lý tiếp theo:</label>
        <textarea id="nextSteps" rows="2">- &#10;- </textarea>
    </div>

    <div class="form-row">
        <label for="staff">8. Người điều hành / Xử lý (Mỗi chức danh một dòng):</label>
        <textarea id="staff" rows="4">- Quản lý sự cố (IM): Nguyễn Thái Bình&#10;- Nhân sự FO: Lê Kim Bính&#10;- Nhân sự phòng NVKH: &#10;- Nhân sự đài VHKT MB: </textarea>
    </div>

    <div class="actions-bar">
        <div class="actions-title">Chọn trạng thái để Đồng bộ SharePoint & Xuất văn bản Viber</div>
        <div class="btn-zone">
            <button class="btn btn-danger" onclick="process('START')">🔴 1. Bắt đầu</button>
            <button class="btn btn-warning" onclick="process('UPDATE')">🟡 2. Cập nhật</button>
            <button class="btn btn-success" onclick="process('END')">🟢 3. Kết thúc</button>
        </div>
        <div id="sharepointStatus" class="sp-status" style="display: none;">⏳ Đang đồng bộ dữ liệu lên SharePoint...</div>
    </div>

    <div class="output-zone" id="outputArea" style="display:none;">
        <div class="output-header">
            <div class="output-title">Nội dung sao chép gửi Viber:</div>
            <div class="output-btn-cell">
                <button class="btn-copy" id="copyBtn" onclick="copyText()">📋 Sao Chép Nhanh</button>
            </div>
        </div>
        <textarea id="finalResult" readonly></textarea>
    </div>
</div>

<script>
    // ĐIỀN ĐƯỜNG DẪN WEBHOOK POWER AUTOMATE CỦA BẠN VÀO ĐÂY
    const POWER_AUTOMATE_URL = "https://default89a7f078234b46eea96e0b8e8b347c.be.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/9413946b032a41d9bc8d198a968aea0b/triggers/manual/paths/invoke?api-version=1";

    function getSystemTime() {
        const d = new Date();
        const pad = (v) => v < 10 ? '0' + v : v;
        return `${pad(d.getHours())}:${pad(d.getMinutes())} ${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()}`;
    }

    function setNow(elementId) {
        document.getElementById(elementId).value = getSystemTime();
    }

    function formatBulletLines(rawText) {
        if (!rawText || !rawText.trim()) return "";
        return rawText.split('\n')
            .map(line => line.trim())
            .filter(line => line !== "")
            .map(line => `\t${line}`)
            .join('\n');
    }

    function process(status) {
        const currentTime = getSystemTime();
        const name = document.getElementById('incidentName').value.trim();
        let start = document.getElementById('startTime').value.trim();
        let end = document.getElementById('endTime').value.trim();
        const impact = document.getElementById('impact').value.trim();
        const reason = document.getElementById('reason').value.trim();
        const steps = document.getElementById('steps').value.trim();
        const nextSteps = document.getElementById('nextSteps').value.trim();
        const staff = document.getElementById('staff').value.trim();

        if (status === 'START' && !start) {
            start = currentTime;
            document.getElementById('startTime').value = currentTime;
        }
        if (status === 'END' && !end) {
            end = currentTime;
            document.getElementById('endTime').value = currentTime;
        }

        let titleHeader = "[SỰ CỐ]";
        if (status === 'UPDATE') titleHeader = "[SỰ CỐ][CẬP NHẬT]";
        if (status === 'END') titleHeader = "[SỰ CỐ][KẾT THÚC]";

        let result = `${titleHeader}\n`;
        result += `Tên sự cố: ${name}\n`;
        result += `Thời gian sự cố:\n`;
        result += `\t- Thời gian bắt đầu: ${start}\n`;
        result += `\t- Thời gian kết thúc: ${end}\n`;
        result += `Mức độ ảnh hưởng: ${impact}\n`;
        result += `Nguyên nhân: ${reason}\n`;
        result += `Các bước xử lý:\n${formatBulletLines(steps)}\n`;
        result += `Bước xử lí tiếp theo:\n${formatBulletLines(nextSteps)}\n`;
        result += `Người điều hành/xử lý:\n${formatBulletLines(staff)}`;

        document.getElementById('finalResult').value = result;
        document.getElementById('copyBtn').innerText = "📋 Sao Chép Nhanh";
        
        const outArea = document.getElementById('outputArea');
        outArea.style.display = 'block';
        outArea.scrollIntoView({ behavior: 'smooth' });

        // TỰ ĐỘNG KÍCH HOẠT ĐẨY DỮ LIỆU SANG SHAREPOINT (KẾ THỪA)
        sendToSharePoint(status, name, start, end, impact, reason, steps, nextSteps, staff);
    }

    function sendToSharePoint(status, name, start, end, impact, reason, steps, nextSteps, staff) {
        if (!POWER_AUTOMATE_URL || POWER_AUTOMATE_URL.includes("LÀM_THEO_HƯỚNG_DẪN")) {
            console.log("Chưa cấu hình URL Power Automate.");
            return;
        }

        const spStatus = document.getElementById('sharepointStatus');
        spStatus.style.display = 'block';
        spStatus.style.color = '#f59e0b';
        spStatus.innerText = "⏳ Đang đồng bộ dữ liệu lên SharePoint...";

        // Đóng gói payload JSON sạch sẽ có tính kế thừa cao
        const payload = {
            "Status": status,
            "Event_Title": name,
            "Start_Time": start,
            "End_Time": end,
            "Impact_Scope": impact,
            "Reason": reason,
            "Steps_Taken": steps,
            "Next_Steps": nextSteps,
            "Staff_In_Charge": staff
        };

        fetch(POWER_AUTOMATE_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(response => {
            if (response.ok) {
                spStatus.style.color = '#10b981';
                spStatus.innerText = "✅ Đồng bộ SharePoint thành công!";
            } else {
                throw new Error("Lỗi phản hồi từ API");
            }
        })
        .catch(error => {
            spStatus.style.color = '#ef4444';
            spStatus.innerText = "❌ Đồng bộ lỗi! (Kiểm tra lại cấu hình Flow)";
            console.error(error);
        });
    }

    function copyText() {
        const target = document.getElementById("finalResult");
        const btn = document.getElementById("copyBtn");
        target.focus();
        target.select();
        target.setSelectionRange(0, 99999);

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(target.value)
                .then(() => { btn.innerText = "✅ Đã Copy!"; })
                .catch(() => {
                    try {
                        document.execCommand("copy");
                        btn.innerText = "✅ Đã Copy!";
                    } catch (err) {
                        alert("Trình duyệt chặn sao chép tự động. Hãy copy thủ công!");
                    }
                });
        } else {
            try {
                document.execCommand("copy");
                btn.innerText = "✅ Đã Copy!";
            } catch (err) {
                alert("Hãy bôi đen và nhấn Ctrl+C để copy.");
            }
        }
    }
</script>
</body>
</html>
